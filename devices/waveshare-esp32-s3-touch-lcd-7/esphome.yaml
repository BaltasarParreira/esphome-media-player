# Guition ESP32-P4-JC8012P4A1 Music Dashboard
substitutions:
  name: "music-dashboard-ws7inch"
  friendly_name: "Music Dashboard WS 7inch"
  # ha_host: "homeassistant.local"  # Home Assistant hostname or IP (change if HA runs on a different host)
  # ha_port: "8123"  # Home Assistant port (change if HA runs on a non-standard port)
  # Display rotation: 0, 90 (default landscape), 180, or 270
  # display_rotation: "0"

# Wifi Setup
wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password

# Packages
packages:
  music_dashboard:
    url: https://github.com/BaltasarParreira/esphome-media-player
    files: [devices/waveshare-esp32-s3-touch-lcd-7/packages.yaml]
    ref: main
    refresh: 1s
